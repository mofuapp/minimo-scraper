services:
  - type: web
    name: minimo-scraper-api
    runtime: docker
    repo: https://github.com/mofuapp/minimo-scraper
    branch: main
    region: singapore
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MINIMO_CORS_ORIGINS
        value: https://mofuapp.github.io
      - key: MINIMO_API_KEY
        generateValue: true
